default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks-system
        pass_filenames: false
        stages:
          - pre-commit
          - pre-push

  - repo: local
    hooks:
      - id: dotfiles-privacy
        name: dotfiles privacy boundary
        entry: python3 scripts/privacy_check.py
        language: system
        pass_filenames: false
        stages:
          - pre-commit

      - id: dotfiles-privacy-history
        name: dotfiles privacy boundary including history
        entry: python3 scripts/privacy_check.py --history
        language: system
        pass_filenames: false
        stages:
          - pre-push
          - manual
