# Mouse support plus wheel-to-scrollback behavior.
set -g mouse on
set -g history-limit 100000

# Use vi-style keys in copy mode.
setw -g mode-keys vi
set -g status-keys vi

# Better color support.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Reload config quickly.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Easier pane splits.
bind | split-window -h
bind - split-window -v

# Make the mouse wheel enter tmux copy-mode and scroll pane history instead of
# being passed through to the shell in normal panes.
bind -n WheelUpPane if-shell -F -t= "#{mouse_any_flag}" "send-keys -M" "copy-mode -e"
bind -n WheelDownPane if-shell -F -t= "#{pane_in_mode}" "send-keys -M" ""

# Copy-mode helpers.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
