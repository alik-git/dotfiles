# Mouse support plus wheel-to-scrollback behavior.
set -g mouse on
set -g history-limit 100000

# Better color support.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Make the mouse wheel enter tmux copy-mode and scroll pane history instead of
# being passed through to the shell in normal panes.
bind -n WheelUpPane if-shell -F -t= "#{mouse_any_flag}" "send-keys -M" "copy-mode -e"
bind -n WheelDownPane if-shell -F -t= "#{pane_in_mode}" "send-keys -M" ""
